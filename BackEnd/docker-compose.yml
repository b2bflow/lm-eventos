services:
  mongo:
    image: mongo:7
    container_name: mongo_lm
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: game_station_dev_db
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis_lm
    restart: always
    ports:
      - "6379:6379"

  mongo-express:
    image: mongo-express:1.0.0-alpha.4
    container_name: mongo_container_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo

volumes:
  mongo_data: